name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-format:
    name: Lint Format (Clang-Format)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-build/build-native:latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Configure CMake (Dry Run Format)
      run: cmake -B build -S . -DFORMAT_DRY_RUN=ON -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Check Formatting
      run: cmake --build build --target caffeine-hal-format

  static-analysis:
    name: Static Analysis (Cppcheck & Clang-Tidy)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-build/build-native:latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Configure CMake
      run: cmake -B build -S . -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Run Analysis
      run: |
        cmake --build build --target caffeine-hal-analyze
        cmake --build build --target caffeine-hal-compliance

  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint-format]
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-build/build-native:latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install gcovr
      run: apt-get update && apt-get install -y gcovr

    - name: Configure CMake
      run: cmake -B build -S . -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Build Tests
      run: cmake --build build --target caffeine-hal-test -j 4

    - name: Run Unit Tests
      run: ctest --test-dir build --output-on-failure

    - name: Run Coverage
      run: cmake --build build --target caffeine-hal-coverage

    - name: PR Comment with Coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('build/coverage.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '### Code Coverage Report 📊\n```\n' + coverage + '\n```'
          })

  docs-generation:
    name: Documentation Generation (Doxygen)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: ghcr.io/${{ github.repository_owner }}/caffeine-build/build-native:latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Configure CMake
      run: cmake -B build -S . -DFETCHCONTENT_FULLY_DISCONNECTED=ON

    - name: Build Doxygen Target
      run: cmake --build build --target caffeine-hal-docs

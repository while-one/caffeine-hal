name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-format:
    name: Lint Format (Clang-Format)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Check Formatting
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest caffeine-hal-format -DFORMAT_DRY_RUN=ON

  static-analysis:
    name: Static Analysis (Cppcheck & Clang-Tidy)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Run Analysis
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest caffeine-hal-analyze

  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint-format]
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Build and Run Tests
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest all

    - name: Run Coverage
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest caffeine-hal-coverage

    - name: PR Comment with Coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('build/unit-tests-gtest/coverage.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '### Code Coverage Report 📊\n```\n' + coverage + '\n```'
          })

  docs-generation:
    name: Documentation Generation (Doxygen)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Build Doxygen Target
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest caffeine-hal-docs
